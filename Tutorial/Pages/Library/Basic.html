<div class="tutorialTitle">Basic Types</div>
<div class="tutorialText">
	Basic types in Smalltalk are <code>Nil</code> and <code>Boolean</code> .<br>
	<br>
	<a href="Basic/Nil.html"><code>Nil</code></a>
	refers to the <code>nil</code> singleton object.<br>
	Variables are initialised to this value by default.<br>
	<br>
	<a href="Basic/Boolean.html"><code>Boolean</code></a>
	refers to either the <code>true</code> or <code>false</code> singleton object.<br>
</div>
